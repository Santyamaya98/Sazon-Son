<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAZON & SON - Sistema de Pedidos</title>
    <style>
        {% include "styles.css" %}
    </style>
</head>
<body>

<!-- Two Selectors with Django Template Variables -->
<!-- Two Selectors with Django Template Variables -->
<div class="selector-container">
    
    <!-- Selector 1: All Tables -->
    <div class="selector-wrapper">
        <label class="selector-label">
            Seleccionar Mesa
        </label>
        <select id="allTablesSelector" class="selector-input" onchange="selectTableFromDropdown(this.value)">
            <option value="">-- Elige una mesa --</option>
            <!-- Sort tables by number numerically -->
            {% for table in all_tables|dictsort:"number" %}
                <option value="{{ table.id }}" 
                        data-occupied="{{ table.is_occupied|lower }}"
                        data-number="{{ table.number }}">
                    Mesa {{ table.number }} - 
                    {% if table.is_occupied %}
                        Ocupada
                        {% if table.current_order %}
                            (Pedido #{{ table.current_order.order_number }})
                        {% endif %}
                    {% else %}
                        Disponible
                    {% endif %}
                </option>
            {% endfor %}
        </select>
    </div>

    <!-- Selector 2: Active Orders Only -->
    <div class="selector-wrapper">
        <label class="selector-label">
            Ver Mesas Activas
        </label>
        <select id="activeTablesSelector" class="selector-input" onchange="selectTableFromDropdown(this.value)">
            <option value="">-- Mesas con pedidos --</option>
            <!-- Show only occupied tables, sorted by number -->
            {% for table in all_tables|dictsort:"number" %}
                {% if table.is_occupied %}
                    <option value="{{ table.id }}" 
                            data-occupied="true"
                            data-number="{{ table.number }}">
                        Mesa {{ table.number }} - 
                        {% if table.current_order %}
                            Pedido #{{ table.current_order.order_number }} 
                            (€{{ table.current_order.total_amount|floatformat:2 }})
                        {% endif %}
                    </option>
                {% endif %}
            {% endfor %}
        </select>
    </div>
</div>

<!-- Display area for selected table info -->
<div id="selectedTableInfo" class="selected-table-info hidden">
    <h3 id="selectedTableName" class="table-name"></h3>
    <div id="orderDetails" class="order-details"></div>
    <button id="createOrderBtn" class="create-order-btn hidden">
        Crear Pedido
    </button>
</div>

<!-- Add this modal BEFORE closing </body> tag -->
<div id="tableModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle">Seleccionar Mesa</h2>
            <span class="close" onclick="closeTableModal()">&times;</span>
        </div>
        <div id="modalTablesGrid" class="modal-tables-grid">
            <!-- Dynamic table buttons will load here -->
        </div>
    </div>
</div>

<!-- Add this active tables viewer BEFORE closing </body> tag -->
<div id="activeTablesModal" class="modal">
    <div class="modal-content-wide">
        <div class="modal-header">
            <h2>Mesas Activas</h2>
            <span class="close" onclick="closeActiveTablesModal()">&times;</span>
        </div>
        <div id="activeTablesList">
            <!-- Active tables with orders will show here -->
        </div>
    </div>
</div>
    <div class="container">
        <div class="header">
            <h1>SAZON & SON Cocina-Bar</h1>
            <p>Sistema de Pedidos</p>
        </div>
        
        <div class="main-content">
            <div class="menu-section">
                <div class="category-tabs" id="categoryTabs">
                    <!-- Categories will be loaded here -->
                </div>
                
                <div id="menuItems">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Cargando menú...</p>
                    </div>
                </div>
            </div>
            
 <!--            
            <div class="cart-section">
                <h2>Tu Pedido</h2>
             
                <div id="cartItems">
                    <div class="empty-cart">
                        <p>Tu carrito está vacío</p>
                        <p>Añade items del menú</p>
                    </div>
                </div>
                
                <div id="cartSummary" style="display: none;">
                    <div class="cart-total">
                        Total: €<span id="totalAmount">0.00</span>
                    </div>
                -->     
                    <div class="order-form">
                        <div class="form-group">
                            <label for="tableNumber">Número de Mesa</label>
                            <input type="text" id="tableNumber" placeholder="Ej: 5">
                        </div>
                        
                        <div class="form-group">
                            <label for="customerName">Nombre (Opcional)</label>
                            <input type="text" id="customerName" placeholder="Tu nombre">
                        </div>
                        
                        <div class="form-group">
                            <label for="customerPhone">Teléfono (Opcional)</label>
                            <input type="tel" id="customerPhone" placeholder="Tu teléfono">
                        </div>
                        
                        <div class="form-group">
                            <label for="orderNotes">Notas del Pedido</label>
                            <textarea id="orderNotes" rows="3" placeholder="Alergias, preferencias, etc."></textarea>
                        </div>
                                <!-- Table Selection View -->
        <div id="tableView" class="table-view">
            <h2 style="color: white; margin-bottom: 20px;">Seleccionar Mesa</h2>
            <div class="tables-grid" id="tablesGrid">
                <!-- Tables will be loaded here -->
            </div>
        </div>
        
        <!-- Order Management View -->
        <div id="orderView" class="order-container">
            <div class="order-header">
                <div>
                    <h2>Mesa <span id="currentTableNumber">-</span></h2>
                    <p>Pedido #<span id="currentOrderNumber">-</span></p>
                </div>
                <button class="back-btn" onclick="backToTables()">← Volver a Mesas</button>
            </div>
            
            <div class="order-content">
                <div class="menu-section">
                    <h3>Menú</h3>
                    <div class="category-tabs" id="categoryTabs">
                        <!-- Categories will be loaded here -->
                    </div>
                    <div id="menuItems">
                        <!-- Menu items will be loaded here -->
                    </div>
                </div>
                
                <div class="order-section">
                    <h3>Pedido Actual</h3>
                    <div id="orderItems">
                        <!-- Order items will be listed here -->
                    </div>
                    
                    <div class="order-summary">
                        <div class="total-amount">
                            Total: €<span id="orderTotal">0.00</span>
                        </div>
                    </div>
                        <button class="submit-order" onclick="submitOrder()">
                            Enviar Pedido
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
   <script>
        {% include "script.js" %}
    </script>
</body>
</html>
